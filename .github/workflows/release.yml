name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from AppVersion.cs
        id: version
        shell: pwsh
        run: |
          $c = Get-Content "src\ProdToy.Win\Core\AppVersion.cs" -Raw
          if ($c -match 'Current\s*=\s*"(\d+\.\d+\.\d+)"') {
            "VERSION=$($Matches[1])" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "Could not parse version"; exit 1
          }

      - name: Check if tag already exists
        id: check_tag
        shell: bash
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.VERSION }}" | grep -q .; then
            echo "EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Run publish.ps1
        if: steps.check_tag.outputs.EXISTS == 'false'
        shell: pwsh
        env:
          RELEASE_NOTES: ${{ github.event.head_commit.message }}
        run: |
          .\publish.ps1 -SkipVersionBump -ReleaseNotes $env:RELEASE_NOTES

      - name: Verify release artifacts
        if: steps.check_tag.outputs.EXISTS == 'false'
        shell: pwsh
        run: |
          $required = @(
            'release/metadata.json',
            'release/ProdToy.zip',
            'release/ProdToySetup.exe'
          )
          foreach ($f in $required) {
            if (-not (Test-Path $f)) { Write-Error "Missing required artifact: $f"; exit 1 }
          }
          $pluginZips = Get-ChildItem 'release/plugins/*.zip' -ErrorAction SilentlyContinue
          if ($pluginZips.Count -eq 0) { Write-Error "No plugin zips produced"; exit 1 }
          Write-Host "OK. Found $($pluginZips.Count) plugin zip(s)."

      - name: Flatten plugin zips for release upload
        if: steps.check_tag.outputs.EXISTS == 'false'
        shell: pwsh
        run: |
          # GitHub Releases is a flat asset namespace. Copy plugin zips to
          # release/ root so softprops/action-gh-release can upload them
          # alongside the host artifacts.
          Copy-Item release/plugins/*.zip release/ -Force

      - name: Create GitHub Release
        if: steps.check_tag.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: ProdToy v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            release/metadata.json
            release/ProdToy.zip
            release/ProdToySetup.exe
            release/ProdToy.Plugin.Alarm.zip
            release/ProdToy.Plugin.Screenshot.zip
            release/ProdToy.Plugin.ClaudeIntegration.zip
            release/ProdToy.Plugin.ShortCutManager.zip
